<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="4 / 8 / 12 / 14 / 20 / 28 / pill" viewport="700x200" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Radii</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--gnu-anthracite); border: 1px solid var(--gnu-anthracite); }
  .name { font-size: 11px; font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:0"></div><span class="name">none</span><span class="v">0</span></div>
    <div class="tile"><div class="box" style="border-radius:4px"></div><span class="name">r-1</span><span class="v">4</span></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><span class="name">r-2</span><span class="v">8</span></div>
    <div class="tile"><div class="box" style="border-radius:12px"></div><span class="name">r-3</span><span class="v">12</span></div>
    <div class="tile"><div class="box" style="border-radius:14px"></div><span class="name">r-4 · TUI</span><span class="v">14</span></div>
    <div class="tile"><div class="box" style="border-radius:28px"></div><span class="name">r-6 · cube</span><span class="v">28</span></div>
    <div class="tile"><div class="box" style="border-radius:999px"></div><span class="name">pill</span><span class="v">999</span></div>
  </div>
</div>
</body>
</html>
