<!doctype html>
<!-- @dsCard group="Brand" name="Brand Symbols" subtitle="Prompt mark · cube · cube-dialogue · app icon · badges" viewport="700x280" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Symbols</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .frame {
    width: 100%;
    aspect-ratio: 1;
    background: #FFFFFF;
    border: 1px solid var(--line-2);
    border-radius: 14px;
    display:grid;
    place-items:center;
    padding: 10px;
    box-sizing: border-box;
  }
  .frame.dark { background: #111418; border-color: #111418; }
  .label { font-size: 11px; font-weight: 600; text-align: center; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile">
      <div class="frame">
        <svg viewBox="0 0 96 64" aria-hidden="true">

          <line x1="167" y1="153" x2="184" y2="153" stroke="#FFF" stroke-width="10" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="label">cube</span>
    </div>
    <div class="tile">
      <div class="frame">
        <svg viewBox="0 0 300 256">
          <path d="M 194 52 H 256 Q 268 52 268 64 V 178 Q 268 190 256 190 H 184 L 160 214 V 190 H 146" fill="none" stroke="#FF6A00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="66,66 128,32 190,66 128,100" fill="#FF6A00"/>
          <polygon points="60,78 122,113 122,181 60,146" fill="#FF6A00"/>

      </div>
      <span class="label">cube + dialogue</span>

</html>
