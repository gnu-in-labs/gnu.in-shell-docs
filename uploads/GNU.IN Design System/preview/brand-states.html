<!-- @dsCard group="Brand" name="Mascot State Grammar" subtitle="IDLE / LISTENING / TRANSMIT / VEILLE — canonical SysterMini" viewport="700x300" -->
<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>State grammar</title>
<link rel="stylesheet" href="_card.css" />
<style>
  body { background: var(--gnu-shell); }
  .card { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .state { display: flex; flex-direction: column; gap: 9px; align-items: stretch; }
  .tile {
    position: relative; aspect-ratio: 1; border-radius: 14px; overflow: hidden;
    background: radial-gradient(120% 110% at 50% 28%, #20262E 0%, #14181D 60%, #0D1014 100%);
    border: 1px solid #262C32; display: grid; place-items: center;
  }
  .tile svg { width: 84%; height: 84%; display: block; }
  .meta { display: flex; flex-direction: column; gap: 3px; padding: 0 2px; }
  .head { display: flex; align-items: center; gap: 7px; }
  .pip { width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto; }
  .name { font-size: 10.5px; letter-spacing: 0.13em; font-weight: 700; text-transform: uppercase; color: var(--fg1); }
  .desc { font-size: 10.5px; color: var(--fg2); line-height: 1.35; }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/syster-mini.jsx"></script>
<script type="text/babel">
const STATES = [
  { k:"idle",      c:"var(--gnu-stone)",   label:"Idle",      desc:'>_ resting prompt' },
  { k:"listening", c:"var(--gnu-orange)",  label:"Listening", desc:"antenna lamp + signal arcs" },
  { k:"transmit",  c:"var(--gnu-beret)",   label:"Transmit",  desc:"sonar rings · prompt dots" },
  { k:"veille",    c:"var(--gnu-slate)",   label:"Veille",    desc:"screen off · antenna z's" },
];
function Card() {
  return (
    <div className="card">
      <div className="row">
        {STATES.map(s => (
          <div className="state" key={s.k}>
            <div className="tile"><SysterMini size={150} state={s.k} play={true} /></div>
            <div className="meta">
              <div className="head"><span className="pip" style={{ background: s.c }}></span><span className="name" style={{ color: s.c }}>{s.label}</span></div>
              <span className="desc">{s.desc}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
