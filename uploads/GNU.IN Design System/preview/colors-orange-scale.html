<!doctype html>
<!-- @dsCard group="Colors" name="Orange Scale" subtitle="Tonal variants of Signal Orange" viewport="700x220" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Orange tonal scale</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--line-2); }
  .scale .step { padding: 18px 12px 14px; min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; }
  .scale .name { font-size: 11px; font-weight: 600; }
  .scale .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
  .pair { display:flex; gap:12px; align-items:center; padding: 10px 12px; border:1px solid var(--line-2); border-radius:10px; }
  .pair .dot { width: 22px; height: 22px; border-radius: 6px; }
  .pair .label { font-size: 12px; color: var(--fg2); }
  .pair .role  { font-size: 12px; font-weight: 600; color: var(--fg1); }
</style>
</head>
<body>
<div class="card">
  <div class="scale">
    <div class="step" style="background:#FFE5D2"><span class="name">100</span><span class="hex">#FFE5D2</span></div>
    <div class="step" style="background:#FF8E40"><span class="name">300</span><span class="hex">#FF8E40</span></div>
    <div class="step" style="background:#FF6A00; color:#fff"><span class="name">500 · Signal</span><span class="hex">#FF6A00</span></div>
    <div class="step" style="background:#C95400; color:#fff"><span class="name">700 · Hover</span><span class="hex">#C95400</span></div>
    <div class="step" style="background:#B84B00; color:#fff"><span class="name">Shadow</span><span class="hex">#B84B00</span></div>
  </div>
  <div class="card-row" style="gap:10px">
    <div class="pair"><span class="dot" style="background:#FF6A00"></span><span><span class="role">Signal 500</span> <span class="label">— rest</span></span></div>
    <div class="pair"><span class="dot" style="background:#C95400"></span><span><span class="role">Signal 700</span> <span class="label">— hover/press</span></span></div>
    <div class="pair"><span class="dot" style="background:#FFE5D2"></span><span><span class="role">Signal 100</span> <span class="label">— accent-soft</span></span></div>
  </div>
</div>
</body>
</html>
