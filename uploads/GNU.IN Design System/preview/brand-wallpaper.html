<!doctype html>
<!-- @dsCard group="Brand" name="Hero Wallpaper" subtitle="Cube wallpaper — atomic-age warmth" viewport="700x400" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Hero wallpaper</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .frame { border-radius: 14px; overflow: hidden; border: 1px solid var(--line-2); position: relative; }
  .frame img { display:block; width: 100%; height: auto; }
  .overlay {
    position: absolute; left: 16px; bottom: 14px;
    color: #F7F3ED;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .overlay .orange { color: var(--gnu-orange); }
</style>
</head>
<body>
<div class="card">
  <div class="frame">
    <img src="../assets/imagery/wallpaper-hero.png" alt="GNU.IN hero wallpaper"/>
    <div class="overlay"><span class="orange">>_</span> gnu.in-shell · canonical hero · 16:9</div>
  </div>
</div>
</body>
</html>
