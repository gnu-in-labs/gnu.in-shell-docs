<!doctype html>
<!-- @dsCard group="Colors" name="Semantic States" subtitle="listening · ok · alert · warn · idle" viewport="700x240" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Semantic state colors</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; }
  .pill {
    border-radius: 10px;
    padding: 14px 14px 16px;
    color:#fff;
    display:flex;
    flex-direction:column;
    gap: 6px;
    min-height: 100px;
    justify-content: space-between;
  }
  .pill .name { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; }
  .pill .desc { font-size: 12px; opacity: 0.85; line-height: 1.3; }
  .pill .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .pip { width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="pill" style="background:#FF6A00">
      <span class="name">Listen</span>
      <span class="desc">Transmit · agent active</span>
      <span class="hex">#FF6A00</span>
    </div>
    <div class="pill" style="background:#5F7F52">
      <span class="name">Stable</span>
      <span class="desc">OK · success · stable</span>
      <span class="hex">#5F7F52</span>
    </div>
    <div class="pill" style="background:#F5A524; color:#111418">
      <span class="name">Stress</span>
      <span class="desc">Warn · overload</span>
      <span class="hex">#F5A524</span>
    </div>
    <div class="pill" style="background:#E5484D">
      <span class="name">Breach</span>
      <span class="desc">Alert · failsafe</span>
      <span class="hex">#E5484D</span>
    </div>
    <div class="pill" style="background:#A1A6AD">
      <span class="name">Idle</span>
      <span class="desc">Veille · sleep</span>
      <span class="hex">#A1A6AD</span>
    </div>
  </div>
  <div class="card-row" style="gap:18px; padding: 6px 4px 0; font-size:13px; color:var(--fg2)">
    <span><span class="pip" style="background:#FF6A00"></span>Listening</span>
    <span><span class="pip" style="background:#5F7F52"></span>Stable</span>
    <span><span class="pip" style="background:#F5A524"></span>Warn</span>
    <span><span class="pip" style="background:#E5484D"></span>Alert</span>
    <span><span class="pip" style="background:#A1A6AD"></span>Idle</span>
  </div>
</div>
</body>
</html>
