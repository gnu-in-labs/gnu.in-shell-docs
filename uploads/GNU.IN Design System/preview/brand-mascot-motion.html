<!-- @dsCard group="Brand" name="Sys.ter Motion Spec" subtitle="Canonical state grammar — idle · listening · transmit · veille" viewport="1180x720" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sys.ter — motion spec</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(130% 100% at 50% 38%, #1b212a 0%, #12161c 50%, #0a0d11 100%);
    color: var(--gnu-shell); font-family: var(--font-sans); min-height: 100%;
    display: flex; flex-direction: column; overflow: hidden; }
  .top { display: flex; align-items: center; justify-content: space-between;
    padding: 22px 30px 0; font-family: var(--font-mono); font-size: 12px; color: var(--gnu-stone); }
  .top .o { color: var(--gnu-orange); }
  .top .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--ls-tag);
    text-transform: uppercase; font-weight: 600; color: var(--gnu-shell);
    display: inline-flex; align-items: center; gap: 8px; }
  .top .label .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--c, var(--gnu-stone));
    box-shadow: 0 0 12px 1px var(--c); transition: background var(--gnu-dur-base) var(--gnu-ease-enter); }
  .stage { flex: 1; display: grid; place-items: center; }
  .status { text-align: center; font-family: var(--font-mono); font-size: 13px; color: var(--gnu-stone); min-height: 20px; padding-bottom: 2px; }
  .status .k { color: var(--gnu-slate); } .status .v { color: var(--gnu-shell); } .status .a { color: var(--gnu-orange); }
  .rail { display: flex; justify-content: center; gap: 8px; padding: 18px 24px 12px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--gnu-shell);
    font-family: var(--font-mono); font-size: 12.5px; cursor: pointer;
    transition: background var(--gnu-dur-quick) var(--gnu-ease-enter), border-color var(--gnu-dur-quick), transform var(--gnu-dur-quick); }
  .chip:hover { background: rgba(255,255,255,0.08); } .chip:active { transform: scale(0.96); }
  .chip .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--c); flex: 0 0 auto; }
  .chip.on { border-color: var(--c); background: color-mix(in srgb, var(--c) 18%, transparent); }
  .chip.on .pip { box-shadow: 0 0 9px 1px var(--c); }
  .hint { text-align: center; font-size: 11px; color: var(--gnu-slate); padding-bottom: 24px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/syster-mini.jsx"></script>
<script type="text/babel">
const { useState } = React;
const STATES = {
  idle:      { c:"#A1A6AD", token:"--gnu-dur-breathe", dur:"4200ms", ease:"breathe", moves:"slow bob · cursor blink" },
  listening: { c:"#FF6A00", token:"--gnu-dur-pulse",   dur:"1400ms", ease:"enter",  moves:"antenna bulb pulse · signal arcs" },
  transmit:  { c:"#5F7F52", token:"--gnu-ease-bloom",  dur:"1700ms", ease:"bloom",  moves:"sonar rings · prompt dots" },
  veille:    { c:"#667085", token:"--gnu-dur-slow",    dur:"560ms",  ease:"exit",   moves:"dim · drifting z's" },
};
function App() {
  const [state, setState] = useState("idle");
  const s = STATES[state];
  return (
    <React.Fragment>
      <div className="top">
        <span>syster.motion <span className="o">&gt;_</span> canonical state grammar</span>
        <span className="label" style={{ "--c": s.c }}><span className="pip"></span>{state.toUpperCase()}</span>
      </div>
      <div className="stage"><SysterMini size={320} state={state} play={true} /></div>
      <div className="status">
        <span className="k">state</span> <span className="v">{state}</span>  <span className="k">·</span>  <span className="k">token</span> <span className="a">{s.token}</span>  <span className="k">·</span>  <span className="v">{s.dur}</span>  <span className="k">·</span>  <span className="k">moves</span> <span className="v">{s.moves}</span>
      </div>
      <div className="rail">
        {Object.keys(STATES).map(k => (
          <button key={k} className={"chip" + (state === k ? " on" : "")} style={{ "--c": STATES[k].c }} onClick={() => setState(k)}>
            <span className="pip"></span>{k}
          </button>
        ))}
      </div>
      <div className="hint">canonical SysterMini · four states from syster-mini.jsx</div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
