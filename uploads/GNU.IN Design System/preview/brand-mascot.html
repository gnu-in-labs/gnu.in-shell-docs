<!-- @dsCard group="Brand" name="Sys.ter Mascot" subtitle="Canonical beret-less mini — orange terminal cube · live >_ screen · signal antenna" viewport="700x380" -->
<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;}
  .card{width:700px;height:380px;box-sizing:border-box;display:flex;align-items:center;gap:30px;padding:0 40px;background:#0D1014;}
  .hero{width:280px;height:280px;flex:0 0 auto;display:grid;place-items:center;}
  .meta{display:flex;flex-direction:column;gap:13px;color:var(--gnu-shell);}
  .meta .eyebrow{font-size:11px;letter-spacing:var(--ls-tag);text-transform:uppercase;font-weight:600;color:var(--gnu-stone);}
  .meta h3{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;}
  .meta p{margin:0;font-size:13px;line-height:1.55;color:#B6BCC4;max-width:300px;}
  .parts{display:flex;gap:7px;flex-wrap:wrap;}
  .parts span{font-family:var(--font-mono);font-size:11px;color:var(--gnu-stone);background:#1A1F26;border:1px solid #2B3037;border-radius:999px;padding:4px 10px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/syster-mini.jsx"></script>
<script type="text/babel">
function Card() {
  return (
    <div className="card">
      <div className="hero"><SysterMini size={260} state="idle" /></div>
      <div className="meta">
        <span className="eyebrow">Sys.ter · canonical · beret-less</span>
        <h3>The Sys.ter</h3>
        <p>Front-facing orange terminal cube — live <code style={{fontFamily:'var(--font-mono)'}}>&gt;_</code> screen, signal antenna on the top-right with a bulb lamp. No beret, no side-plane, no vents.</p>
        <div className="parts"><span>shell</span><span>screen</span><span>&gt;_ prompt</span><span>antenna</span><span>signal lamp</span></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
