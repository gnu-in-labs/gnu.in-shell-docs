<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Notification cards</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0&display=block" rel="stylesheet" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { background: var(--col-layer0); }
  .ms { font-family: "Material Symbols Rounded"; font-variation-settings: "FILL" 1, "wght" 450, "opsz" 24; }
  .row { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }
  .notif {
    display: flex; gap: 12px; padding: 14px; border-radius: 22px;
    background: var(--col-layer2); border: 1px solid var(--col-layer0-border);
    color: var(--col-on-layer0); box-shadow: 0 12px 30px rgba(0,0,0,0.45);
  }
  .icon { width: 40px; height: 40px; border-radius: 999px; display: grid; place-items: center; flex: 0 0 auto;
    background: var(--m3-secondary-container); color: var(--m3-on-secondary-container); }
  .icon .ms { font-size: 22px; }
  .body { flex: 1; min-width: 0; }
  .top { display: flex; align-items: baseline; gap: 8px; }
  .app { font-size: 12px; color: var(--m3-primary); font-weight: 600; }
  .time { font-size: 11px; color: var(--col-subtext); margin-left: auto; }
  .title { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .text { font-size: 13px; color: var(--col-on-layer1); margin-top: 2px; line-height: 1.4; font-family: var(--font-mono); }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn { font-size: 12.5px; font-weight: 600; padding: 7px 16px; border-radius: 999px; background: var(--col-layer3); color: var(--col-on-layer0); }
  .btn.primary { background: var(--m3-primary); color: var(--m3-on-primary); }
  .close { width: 26px; height: 26px; border-radius: 999px; display: grid; place-items: center; color: var(--col-subtext); flex: 0 0 auto; align-self: flex-start; }
  .close .ms { font-size: 17px; font-variation-settings: "FILL" 0, "wght" 450, "opsz" 24; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="notif">
      <div class="icon"><span class="ms">bolt</span></div>
      <div class="body">
        <div class="top"><span class="app">GNU6-shell</span><span class="time">now</span></div>
        <div class="title">local agent ready</div>
        <div class="text">&gt;_ context loaded · 3 notifications en attente</div>
        <div class="actions"><span class="btn primary">Open</span><span class="btn">Dismiss</span></div>
      </div>
      <div class="close"><span class="ms">close</span></div>
    </div>
    <div class="notif">
      <div class="icon"><span class="ms">system_update</span></div>
      <div class="body">
        <div class="top"><span class="app">system</span><span class="time">2m</span></div>
        <div class="title">Quickshell reloaded</div>
        <div class="text">Commande reçue. Exécution planifiée: ./run</div>
      </div>
      <div class="close"><span class="ms">close</span></div>
    </div>
  </div>
</div>
</body>
</html>
