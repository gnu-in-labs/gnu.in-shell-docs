<!doctype html>
<!-- @dsCard group="Type" name="Display Type" subtitle="Display XL & Display weights" viewport="700x280" -->
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="../../../assets/symbols/cube.svg">
<meta charset="utf-8" />
<title>Display type · Montreal</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="card">
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-sans); font-size:84px; line-height:1; letter-spacing:-0.025em; font-weight:700; color:var(--fg1);">
      gnu<span style="color:var(--gnu-orange);">.</span>in<span style="color:var(--gnu-beret);">.</span><span style="color:var(--fg1);">OS</span>
    </div>
  </div>
  <div style="display:flex; gap:18px; align-items:baseline; padding-top:6px; border-top:1px solid var(--line-2);">
    <div style="font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--fg2); font-weight:500;">Montreal · Geometric Sans</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg3);">700 · 84px · -0.025em</div>
  </div>
  <div style="font-family:var(--font-sans); font-size:13px; color:var(--fg2); line-height:1.45;">
    Tight tracking, weighty bold, lowercase by default. Orange <strong style="color:var(--gnu-orange)">.</strong> after <code style="font-family:var(--font-mono);font-size:12px">gnu</code>, beret-green <strong style="color:var(--gnu-beret)">.</strong> before <strong style="color:var(--fg1)">OS</strong> — the two chromatic dots, with <code style="font-family:var(--font-mono);font-size:12px">OS</code> in ink.
  </div>
</div>
</body>
</html>
